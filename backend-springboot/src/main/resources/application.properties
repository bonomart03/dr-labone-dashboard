# Puerto donde va a correr nuestro backend
server.port=8080

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL - XAMPP)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/drlabone_db?serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ===============================
# CONFIGURACIÓN DE HIBERNATE / JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Permitir subir imagenes pesadas
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# CORS — orígenes permitidos
# ===============================
cors.allowed-origins=http://localhost:5173,http://localhost:5174,${CORS_EXTRA_ORIGINS:}