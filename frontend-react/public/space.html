<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>

    tailwind.config = {
      theme: {
        extend: {

            body:    ["'Barlow'", 'sans-serif'],

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #000; }

    /* ── Liquid Glass — gold-tinted ── */
    .liquid-glass {
      background: rgba(251,191,36,0.03);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(251,191,36,0.12);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(251,191,36,0.50) 0%,
        rgba(251,191,36,0.18) 20%,
        rgba(251,191,36,0)    40%,
        rgba(251,191,36,0)    60%,
        rgba(251,191,36,0.18) 80%,
        rgba(251,191,36,0.50) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(251,191,36,0.05);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(251,191,36,0.20);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(251,191,36,0.60) 0%,
        rgba(251,191,36,0.22) 20%,
        rgba(251,191,36,0)    40%,
        rgba(251,191,36,0)    60%,
        rgba(251,191,36,0.22) 80%,
        rgba(251,191,36,0.60) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useEffect } = React;
    const { motion, useInView }  = window.Motion;

    /* suppress benign Framer Motion list-key warnings */
    const _err = console.error;
    console.error = (...a) => {
      if (typeof a[0] === 'string' && a[0].includes('Each child in a list')) return;
      _err(...a);
    };

    /* ════════════════════════════════════════════════════════════════
       FadingVideo — rAF-driven crossfade loop, no CSS transitions
    ════════════════════════════════════════════════════════════════ */
    const FADE_MS       = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, videoStyle }) {
      const videoRef    = useRef(null);
      const rafRef      = useRef(null);
      const fadingOut   = useRef(false);

      function fadeTo(video, target) {
        cancelAnimationFrame(rafRef.current);
        const t0    = performance.now();
        const start = parseFloat(video.style.opacity) || 0;
        const step  = (now) => {
          const p = Math.min((now - t0) / FADE_MS, 1);
          video.style.opacity = String(start + (target - start) * p);
          if (p < 1) rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
      }

      useEffect(() => {
        const v = videoRef.current;
        if (!v) return;
        v.style.opacity = '0';

        const onLoad = () => {
          v.style.opacity = '0';
          v.play().catch(() => {});
          fadeTo(v, 1);
        };
        const onTime = () => {
          if (!fadingOut.current && v.duration > 0) {
            const rem = v.duration - v.currentTime;
            if (rem <= FADE_OUT_LEAD && rem > 0) {
              fadingOut.current = true;
              fadeTo(v, 0);
            }
          }
        };
        const onEnd = () => {
          v.style.opacity = '0';
          setTimeout(() => {
            v.currentTime  = 0;
            fadingOut.current = false;
            v.play().catch(() => {});
            fadeTo(v, 1);
          }, 100);
        };

        v.addEventListener('loadeddata', onLoad);
        v.addEventListener('timeupdate', onTime);
        v.addEventListener('ended',      onEnd);
        return () => {
          cancelAnimationFrame(rafRef.current);
          v.removeEventListener('loadeddata', onLoad);
          v.removeEventListener('timeupdate', onTime);
          v.removeEventListener('ended',      onEnd);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay muted playsInline preload="auto"
          style={{ ...videoStyle, opacity: 0 }}
        />
      );
    }

    /* ════════════════════════════════════════════════════════════════
       BlurText — word-by-word blur entrance on scroll
    ════════════════════════════════════════════════════════════════ */
    function BlurText({ text, className, color = '#FBBF24' }) {
      const ref      = useRef(null);
      const inView   = useInView(ref, { amount: 0.1, once: true });
      const words    = text.split(' ');
      return (
        <p ref={ref} className={className}
           style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center',
                    rowGap: '0.1em', color, margin: 0 }}>
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={inView ? {
                filter:  ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                opacity: [0, 0.5, 1],
                y:       [50, -5, 0],
              } : {}}
              transition={{ duration: 0.7, times: [0, 0.5, 1],
                            ease: 'easeOut', delay: (i * 100) / 1000 }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    /* ════════════════════════════════════════════════════════════════
       Inline Icons
    ════════════════════════════════════════════════════════════════ */
    const ArrowUpRight = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
      </svg>
    );
    const PlayIcon = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
        <polygon points="6 4 20 12 6 20 6 4"/>
      </svg>
    );

    /* ════════════════════════════════════════════════════════════════
       Navbar
    ════════════════════════════════════════════════════════════════ */
    const NAV_LINKS = ['Home', 'Voyages', 'Worlds', 'Innovation', 'Plan Launch'];

    function Navbar() {
      return (
        <nav style={{
          position: 'fixed', top: '1rem', left: 0, right: 0, zIndex: 50,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '0 2rem',
        }}>
          {/* Logo */}
          <div className="liquid-glass" style={{
            width: 48, height: 48, borderRadius: '9999px',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}>
            <span style={{ fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
                           fontSize: '1.5rem', color: '#FBBF24' }}>a</span>
          </div>

          {/* Center pill */}
          <div className="liquid-glass" style={{
            borderRadius: '9999px', padding: '0.375rem',
            display: 'flex', alignItems: 'center',
          }}>
            {NAV_LINKS.map(l => (
              <a key={l} href="#" style={{
                padding: '0.5rem 0.75rem', fontSize: '0.875rem', fontWeight: 500,
                color: 'rgba(255,255,255,0.9)', fontFamily: "'Barlow', sans-serif",
                textDecoration: 'none', whiteSpace: 'nowrap',
              }}>{l}</a>
            ))}
            <a href="#" style={{
              background: '#FBBF24', color: '#000', borderRadius: '9999px',
              padding: '0.5rem 1.125rem', fontSize: '0.875rem', fontWeight: 700,
              fontFamily: "'Barlow', sans-serif", textDecoration: 'none',
              whiteSpace: 'nowrap', display: 'flex', alignItems: 'center',
              gap: '0.25rem', marginLeft: '0.25rem',
            }}>
              Claim a Spot <ArrowUpRight size={16} />
            </a>
          </div>

          {/* Spacer */}
          <div style={{ width: 48, height: 48, flexShrink: 0 }} />
        </nav>
      );
    }

    /* ════════════════════════════════════════════════════════════════
       Hero Section
    ════════════════════════════════════════════════════════════════ */
    const HERO_SRC = "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4";

    const fadeUp = (delay) => ({
      initial:    { filter: 'blur(10px)', opacity: 0, y: 20 },
      animate:    { filter: 'blur(0px)',  opacity: 1, y: 0  },
      transition: { duration: 0.7, ease: 'easeOut', delay },
    });

    function HeroSection() {
      return (
        <section style={{ position: 'relative', height: '100vh', background: '#000',
                          overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>

          <FadingVideo src={HERO_SRC} videoStyle={{
            position: 'absolute', left: '50%', top: 0,
            transform: 'translateX(-50%)',
            width: '120%', height: '120%',
            objectFit: 'cover', objectPosition: 'top', zIndex: 0,
          }} />

          {/* z-10 layer */}
          <div style={{ position: 'relative', zIndex: 10,
                        display: 'flex', flexDirection: 'column', height: '100%' }}>
            <Navbar />

            {/* ── Center content ── */}
            <div style={{
              flex: 1, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center',
              paddingTop: '6rem', paddingLeft: '1rem', paddingRight: '1rem', textAlign: 'center',
            }}>

              {/* Badge */}
              <motion.div {...fadeUp(0.4)} className="liquid-glass" style={{
                borderRadius: '9999px', display: 'inline-flex', alignItems: 'center',
                gap: '0.5rem', padding: '0.25rem', marginBottom: '1.5rem',
              }}>
                <span style={{
                  background: '#FBBF24', color: '#000', borderRadius: '9999px',
                  padding: '0.25rem 0.75rem', fontSize: '0.75rem', fontWeight: 700,
                  fontFamily: "'Barlow', sans-serif",
                }}>New</span>
                <span style={{
                  fontSize: '0.875rem', color: 'rgba(255,255,255,0.9)',
                  paddingRight: '0.75rem', fontFamily: "'Barlow', sans-serif",
                }}>Maiden Crewed Voyage to Mars Arrives 2026</span>
              </motion.div>

              {/* Headline */}
              <BlurText
                text="Venture Past Our Sky Across the Universe"
                className="font-heading italic leading-[0.8] max-w-2xl tracking-[-4px]"
                style={{ fontSize: 'clamp(3rem, 7vw, 5.5rem)' }}
                color="#FBBF24"
              />

              {/* Subheading */}
              <motion.p {...fadeUp(0.8)} style={{
                marginTop: '1rem', fontSize: '0.9375rem',
                color: 'rgba(255,255,255,0.78)',
                maxWidth: '38rem', fontFamily: "'Barlow', sans-serif",
                fontWeight: 300, lineHeight: 1.55,
              }}>
                Discover the universe in ways once unimaginable. Our pioneering vessels and
                breakthrough engineering bring deep-space exploration within reach—secure and
                extraordinary.
              </motion.p>

              {/* CTAs */}
              <motion.div {...fadeUp(1.1)} style={{
                display: 'flex', alignItems: 'center', gap: '1.5rem', marginTop: '1.5rem',
              }}>
                <button className="liquid-glass-strong" style={{
                  borderRadius: '9999px', padding: '0.625rem 1.375rem',
                  fontSize: '0.875rem', fontWeight: 500, color: '#FBBF24',
                  display: 'flex', alignItems: 'center', gap: '0.375rem',
                  fontFamily: "'Barlow', sans-serif", cursor: 'pointer',
                  background: 'transparent', border: 'none',
                }}>
                  Start Your Voyage <ArrowUpRight size={20} />
                </button>
                <button style={{
                  background: 'none', border: 'none', color: 'rgba(255,255,255,0.82)',
                  display: 'flex', alignItems: 'center', gap: '0.375rem',
                  fontSize: '0.875rem', fontFamily: "'Barlow', sans-serif", cursor: 'pointer',
                }}>
                  View Liftoff <PlayIcon size={16} />
                </button>
              </motion.div>

              {/* Stats cards */}
              <motion.div {...fadeUp(1.3)} style={{
                display: 'flex', alignItems: 'stretch', gap: '1rem', marginTop: '2rem',
              }}>
                {[
                  {
                    icon: (
                      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                           stroke="#FBBF24" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                      </svg>
                    ),
                    value: '34.5 Min', label: 'Average Videos Watch Time',
                  },
                  {
                    icon: (
                      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                           stroke="#FBBF24" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                      </svg>
                    ),
                    value: '2.8B+', label: 'Users Across the Globe',
                  },
                ].map((s, i) => (
                  <div key={i} className="liquid-glass" style={{
                    padding: '1.25rem', width: 220, borderRadius: '1.25rem',
                    display: 'flex', flexDirection: 'column',
                  }}>
                    {s.icon}
                    <div style={{
                      fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
                      color: '#FBBF24', fontSize: '2.25rem', letterSpacing: '-1px',
                      lineHeight: 1, marginTop: '0.75rem',
                    }}>{s.value}</div>
                    <div style={{
                      fontSize: '0.75rem', color: 'rgba(255,255,255,0.6)',
                      fontFamily: "'Barlow', sans-serif", fontWeight: 300, marginTop: '0.5rem',
                    }}>{s.label}</div>
                  </div>
                ))}
              </motion.div>
            </div>

            {/* ── Partners ── */}
            <motion.div {...fadeUp(1.4)} style={{
              display: 'flex', flexDirection: 'column', alignItems: 'center',
              gap: '1rem', paddingBottom: '2rem',
            }}>
              <span className="liquid-glass" style={{
                borderRadius: '9999px', padding: '0.25rem 0.875rem',
                fontSize: '0.75rem', fontWeight: 500, color: 'rgba(255,255,255,0.85)',
                fontFamily: "'Barlow', sans-serif",
              }}>
                Collaborating with top aerospace pioneers globally
              </span>
              <div style={{ display: 'flex', alignItems: 'center', gap: '3rem', flexWrap: 'wrap', justifyContent: 'center' }}>
                {['Aeon', 'Vela', 'Apex', 'Orbit', 'Zeno'].map(name => (
                  <span key={name} style={{
                    fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
                    color: '#FBBF24', fontSize: '1.875rem', letterSpacing: '-0.5px',
                  }}>{name}</span>
                ))}
              </div>
            </motion.div>
          </div>
        </section>
      );
    }

    /* ════════════════════════════════════════════════════════════════
       Capabilities Section
    ════════════════════════════════════════════════════════════════ */
    const CAP_SRC = "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4";

    const CARDS = [
      {
        icon: (
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#FBBF24">
            <path d="M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21H5Zm1-4h12l-3.75-5-3 4L9 13l-3 4Z"/>
          </svg>
        ),
        tags:  ['Natural Context', 'Photo Realism', 'Infinite Settings', 'Eco-Vibe'],
        title: 'AI Scenery',
        body:  'AI analyzes your product to create indistinguishable natural environments — from Icelandic cliffs to misty forests.',
      },
      {
        icon: (
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#FBBF24">
            <path d="M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z"/>
          </svg>
        ),
        tags:  ['Scale Fast', 'Visual Consistency', 'Time Saver', 'Ready to Post'],
        title: 'Batch Production',
        body:  'Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching.',
      },
      {
        icon: (
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#FBBF24">
            <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z"/>
          </svg>
        ),
        tags:  ['Ray Tracing', 'Physical Shadows', 'Studio Quality', 'Sunlight Sync'],
        title: 'Smart Lighting',
        body:  'Automatic lighting and material adjustment. Achieve flawless integration with realistic shadows and sunlight.',
      },
    ];

    function CapabilitiesSection() {
      return (
        <section style={{ position: 'relative', minHeight: '100vh', background: '#000', overflow: 'hidden' }}>
          <FadingVideo src={CAP_SRC} videoStyle={{
            position: 'absolute', inset: 0, width: '100%', height: '100%',
            objectFit: 'cover', zIndex: 0,
          }} />

          <div style={{
            position: 'relative', zIndex: 10,
            padding: 'clamp(5rem,8vw,6rem) clamp(2rem,5vw,5rem) 2.5rem',
            display: 'flex', flexDirection: 'column', minHeight: '100vh',
          }}>

            {/* Header */}
            <div style={{ marginBottom: 'auto' }}>
              <p style={{
                fontSize: '0.875rem', fontFamily: "'Barlow', sans-serif",
                color: '#FBBF24', margin: '0 0 1.5rem',
              }}>// Capabilities</p>
              <h2 style={{
                fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
                color: '#FBBF24',
                fontSize: 'clamp(3.5rem,8vw,6rem)',
                lineHeight: 0.9, letterSpacing: '-3px', margin: 0,
              }}>
                Production<br/>evolved
              </h2>
            </div>

            {/* Cards grid */}
            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))',
              gap: '1.5rem', marginTop: '4rem',
            }}>
              {CARDS.map((card, i) => (
                <div key={i} className="liquid-glass" style={{
                  borderRadius: '1.25rem', padding: '1.5rem',
                  minHeight: 360, display: 'flex', flexDirection: 'column',
                }}>
                  {/* Top row */}
                  <div style={{ display: 'flex', alignItems: 'flex-start',
                                justifyContent: 'space-between', gap: '1rem' }}>
                    {/* Icon box */}
                    <div className="liquid-glass" style={{
                      width: 44, height: 44, borderRadius: '0.75rem',
                      display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                    }}>
                      {card.icon}
                    </div>
                    {/* Tags */}
                    <div style={{ display: 'flex', flexWrap: 'wrap',
                                  justifyContent: 'flex-end', gap: '0.375rem', maxWidth: '70%' }}>
                      {card.tags.map(tag => (
                        <span key={tag} className="liquid-glass" style={{
                          borderRadius: '9999px', padding: '0.25rem 0.75rem',
                          fontSize: '11px', color: '#FBBF24',
                          fontFamily: "'Barlow', sans-serif", whiteSpace: 'nowrap',
                        }}>{tag}</span>
                      ))}
                    </div>
                  </div>

                  <div style={{ flex: 1 }} />

                  {/* Bottom */}
                  <div style={{ marginTop: '1.5rem' }}>
                    <h3 style={{
                      fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
                      color: '#FBBF24',
                      fontSize: 'clamp(1.75rem,2.5vw,2.25rem)',
                      letterSpacing: '-1px', lineHeight: 1, margin: 0,
                    }}>{card.title}</h3>
                    <p style={{
                      marginTop: '0.75rem', fontSize: '0.875rem',
                      color: 'rgba(255,255,255,0.82)',
                      fontFamily: "'Barlow', sans-serif", fontWeight: 300,
                      lineHeight: 1.5, maxWidth: '32ch',
                    }}>{card.body}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ════════════════════════════════════════════════════════════════
       App root
    ════════════════════════════════════════════════════════════════ */
    function App() {
      return (
        <div style={{ background: '#000' }}>
          <HeroSection />
          <CapabilitiesSection />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
